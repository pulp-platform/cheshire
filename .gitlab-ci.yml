# We initialize the nonfree repo, then spawn a sub-pipeline from it

spec:
  inputs:
    cheshire_config:
      description: "Cheshire configuration."
      default: 'default'
      options: ['default', 'hpdcache']

---

stages:
  - nonfree

init:
  stage: nonfree
  script: make nonfree-init
  artifacts:
    paths: [ nonfree/ci.yml ]

subpipe:
  stage: nonfree
  needs: [ init ]
  trigger:
    include:
      - artifact: nonfree/ci.yml
        job: init
        inputs:
          cheshire_config: $[[ inputs.cheshire_config ]]
    strategy: depend
